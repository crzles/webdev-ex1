<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random User Generator</title>

  <link rel="stylesheet" href="./css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="js/jquery.min.js"></script>
  <script src="js/jquery-ui.min.js"></script>

  
</head>
<body>
  <div>
      <!-- Navigation -->    
      <!-- TODO -->
       <nav class="navbar navbar-expand-lg bg-dark">
        <form class="form-inline">
          <button class="btn btn-secondary" onclick="location.reload()">Home</button>
          <a class="btn btn-secondary" href="https://github.com/crzles/webdev-ex1.git" target="_blank">GitHub</a>
          <input class="form-control mr-sm-2" type="text" placeholder="Search" aria-label="Search">
          <button class="btn btn-secondary">Log In</button>
          <button class="btn btn-success">Sign Up</button>
        </form>

       </nav>


      <!-- Header -->
      <div>
        <h1>CSCI 3342 Midterm Exam</h1>
        <h2>Random User Generator</h2>
      </div>
      
      
      <!-- Main Content: Profile Card -->    
      <div class="profile-container">
        <div class="profile">
          <div class="image">
            <img src="./images/user.jpg" />
          </div>
          <div class="details">
            <p>Name: <span id="name">Full name</span></p>
            <p>Email:
              <span id="email">email@gmail.com</span>
            </p>
            <p>Location: <span id="address">Edinburg, TX</span></p>
            <p>Age: <span id="age">30</span></p>
          </div>
        </div>
      </div>
      

      <!-- Next Button -->
      <div class="next">
        <button id="next-btn" class="relative bg-black text-white px-4 py-2 rounded w-full my-4">
          Next Profile
        </button>
      </div>
      
  </div>  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
